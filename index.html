<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VECO - Admin Dashboard</title>
    <!-- ดึง SDK ของ LINE LIFF -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .admin-card { background: white; max-width: 500px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2ecc71; text-align: center; font-size: 24px; }
        .user-info { background: #e8f5e9; padding: 10px; border-radius: 10px; margin-bottom: 20px; text-align: center; border: 1px solid #c8e6c9; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #27ae60; }
        #status { text-align: center; margin-top: 10px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="admin-card">
    <h1>VECO Admin</h1>
    
    <div class="user-info">
        <span id="admin-greeting">กำลังยืนยันตัวตนแอดมิน...</span>
    </div>

    <!-- ฟอร์มจัดการข้อมูล (ตัวอย่าง) -->
    <div class="input-group">
        <label>ชื่อแอดมินที่เข้าระบบ</label>
        <input type="text" id="admin_name" readonly style="background: #eee;">
    </div>

    <div class="input-group">
        <label>อัปเดตสถานะ/หมายเหตุ</label>
        <input type="text" id="note" placeholder="ใส่ข้อมูลที่ต้องการอัปเดต">
    </div>

    <button onclick="updateData()">บันทึกข้อมูล</button>
    <p id="status">เตรียมพร้อมใช้งาน</p>
</div>

<script>
    // ⚠️ นำข้อมูลจากวิดีโอ IMG_2961.mov มาเติมตรงนี้ครับ
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUsOBhMk9Abxc-sQ76fAgrqBUz-ru7hV_GXQiX1ms_LSa27GvzNfkgygGo43vcnYV9TQ/exec"; //
    const MY_LIFF_ID = "2009975524-xymUHzac"; // LIFF ID จากวิดีโอนาทีที่ 0:27

    // 1. เริ่มต้นระบบ LIFF สำหรับแอดมิน
    async function initAdminLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('admin_name').value = profile.displayName;
                document.getElementById('admin-greeting').innerText = "สวัสดีคุณ " + profile.displayName;
                document.getElementById('status').innerText = "แอดมินเข้าสู่ระบบแล้ว";
            } else {
                // ถ้าแอดมินยังไม่ได้ล็อกอิน ให้เด้งไปหน้าล็อกอิน LINE ทันที
                liff.login(); 
            }
        } catch (err) {
            console.error('LIFF Error:', err);
            document.getElementById('status').innerText = "กรุณาเปิดผ่าน LINE";
        }
    }
    initAdminLiff();

    // 2. ฟังก์ชันอัปเดตข้อมูลไปที่ Google Sheets
    async function updateData() {
        const adminName = document.getElementById('admin_name').value;
        const note = document.getElementById('note').value;

        if (!note) {
            alert("กรุณาใส่หมายเหตุด้วยครับ");
            return;
        }

        document.getElementById('status').innerText = "กำลังอัปเดตข้อมูล...";

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    admin: adminName,
                    note: note,
                    timestamp: new Date().toLocaleString('th-TH')
                })
            });
            alert("อัปเดตข้อมูลสำเร็จ!");
            document.getElementById('note').value = "";
            document.getElementById('status').innerText = "จัดการข้อมูลเสร็จสิ้น";
        } catch (error) {
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
            document.getElementById('status').innerText = "ส่งข้อมูลไม่สำเร็จ";
        }
    }
</script>

</body>
</html>
