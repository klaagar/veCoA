<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VECO - ส่งข้อมูลเข้ารับ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #2ecc71; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #2ecc71; outline: none; }
        button { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #27ae60; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2>VECO - ขายสินค้า</h2>
    <div class="input-group">
        <label>ชื่อของคุณ</label>
        <input type="text" id="name" placeholder="ระบุชื่อเพื่อติดต่อ">
    </div>
    <div class="input-group">
        <label>ที่อยู่เข้ารับ (พิกัด)</label>
        <input type="text" id="locate" placeholder="พิมพ์ที่อยู่ หรือ แปะพิกัด Google Maps">
    </div>
    <button id="sendBtn" onclick="sendData()">ส่งข้อมูลให้เรา</button>
</div>

<script>
    // ⚠️ อย่าลืมนำ Web App URL จาก Apps Script มาใส่ตรงนี้
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUsOBhMk9Abxc-sQ76fAgrqBUz-ru7hV_GXQiX1ms_LSa27GvzNfkgygGo43vcnYV9TQ/exec"; 

    async function sendData() {
        const nameValue = document.getElementById('name').value;
        const locateValue = document.getElementById('locate').value;
        const btn = document.getElementById('sendBtn');

        if (!nameValue || !locateValue) {
            alert("กรุณากรอกข้อมูลให้ครบครับ");
            return;
        }

        btn.disabled = true;
        btn.innerText = "กำลังส่งข้อมูล...";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'submit_order',
                    displayName: nameValue,
                    address: locateValue
                })
            });

            alert("ส่งข้อมูลสำเร็จ! ทีม VECO จะติดต่อกลับไปครับ");
            document.getElementById('name').value = "";
            document.getElementById('locate').value = "";
        } catch (error) {
            alert("เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง");
        } finally {
            btn.disabled = false;
            btn.innerText = "ส่งข้อมูลให้เรา";
        }
    }
</script>

</body> 
</html>
